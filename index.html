<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffd166">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎈%3C/text%3E%3C/svg%3E">
<title>Slovíčka 🎈</title>
<style>
  :root {
    --en: #2a9d8f;   /* angličtina */
    --de: #e76f51;   /* němčina */
    --es: #e9c46a;   /* španělština */
    --es-text: #6b4f0a;
    --ink: #3d3a4e;
    --paper: #fffdf7;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; margin: 0; }

  body {
    font-family: "Baloo 2", "Comic Sans MS", "Segoe UI Rounded", system-ui, -apple-system, sans-serif;
    color: var(--ink);
    background: linear-gradient(160deg, #ffe8a3 0%, #ffd6e0 45%, #c7ecff 100%);
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    user-select: none;
    -webkit-user-select: none;
    overflow-x: hidden;
  }

  /* ---------- hlavní karta ---------- */
  main {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(12px, 3vmin, 28px);
    padding: clamp(14px, 4vmin, 36px);
    width: 100%;
    max-width: 640px;
    margin: 0 auto;
  }

  .emoji {
    font-size: clamp(72px, 22vmin, 170px);
    line-height: 1;
    text-align: center;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,.18));
    animation: pop .35s ease;
    cursor: pointer;
    transition: transform .08s ease;
  }
  .emoji:empty { display: none; }
  .emoji:active { transform: scale(.92); }

  .word {
    font-size: clamp(40px, 13vmin, 104px);
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
    color: var(--ink);
    text-shadow: 0 3px 0 #fff, 0 5px 12px rgba(0,0,0,.12);
    animation: pop .35s ease;
    word-break: break-word;
    cursor: pointer;
    transition: transform .08s ease;
  }
  .word:active { transform: scale(.96); }

  /* ---------- jazyková tlačítka ---------- */
  .langs {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: clamp(10px, 2.4vmin, 18px);
  }

  .lang-btn {
    --c: #888;
    border: none;
    cursor: pointer;
    color: #fff;
    background: var(--c);
    border-radius: 22px;
    padding: clamp(14px, 3.2vmin, 24px) clamp(16px, 4vmin, 28px);
    min-height: 68px;
    font-family: inherit;
    font-size: clamp(22px, 6vmin, 40px);
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: clamp(12px, 3vmin, 22px);
    box-shadow: 0 6px 0 rgba(0,0,0,.18), 0 10px 20px rgba(0,0,0,.12);
    transition: transform .08s ease, box-shadow .08s ease, filter .15s ease;
  }
  .lang-btn .flag {
    font-size: 1.25em;
    flex: 0 0 auto;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,.2));
  }
  .lang-btn .txt {
    flex: 1 1 auto;
    text-align: left;
    overflow-wrap: anywhere;
  }
  .lang-btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 rgba(0,0,0,.18), 0 4px 10px rgba(0,0,0,.12);
  }
  .lang-btn.en { --c: var(--en); }
  .lang-btn.de { --c: var(--de); }
  .lang-btn.es { --c: var(--es); color: var(--es-text); }
  .lang-btn.es .flag { filter: none; }

  .lang-btn.speaking {
    animation: wiggle .5s ease infinite;
    filter: brightness(1.08) saturate(1.1);
  }

  /* ---------- spodní lišta ---------- */
  nav {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-around;
    gap: 10px;
    padding: clamp(10px, 2.5vmin, 18px) clamp(14px, 4vmin, 30px);
    padding-bottom: max(clamp(10px,2.5vmin,18px), env(safe-area-inset-bottom));
    width: 100%;
    max-width: 640px;
    margin: 0 auto;
  }
  .nav-btn {
    border: none;
    cursor: pointer;
    background: var(--paper);
    color: var(--ink);
    width: clamp(64px, 16vmin, 92px);
    height: clamp(64px, 16vmin, 92px);
    border-radius: 50%;
    font-size: clamp(28px, 8vmin, 46px);
    display: grid;
    place-items: center;
    box-shadow: 0 5px 0 rgba(0,0,0,.14), 0 8px 16px rgba(0,0,0,.12);
    transition: transform .08s ease, box-shadow .08s ease;
  }
  .nav-btn.shuffle {
    width: clamp(76px, 19vmin, 110px);
    height: clamp(76px, 19vmin, 110px);
    background: #ff70a6;
    color: #fff;
    font-size: clamp(34px, 9vmin, 54px);
  }
  .nav-btn:active {
    transform: translateY(4px);
    box-shadow: 0 1px 0 rgba(0,0,0,.14), 0 3px 8px rgba(0,0,0,.12);
  }

  /* ---------- stavové hlášky ---------- */
  .message {
    margin: auto;
    text-align: center;
    font-size: clamp(20px, 5vmin, 30px);
    font-weight: 700;
    padding: 30px;
    line-height: 1.5;
  }
  .message button {
    margin-top: 22px;
    font-family: inherit;
    font-size: .8em;
    font-weight: 700;
    cursor: pointer;
    border: none;
    border-radius: 18px;
    padding: 14px 26px;
    background: #ff70a6;
    color: #fff;
    box-shadow: 0 5px 0 rgba(0,0,0,.14);
  }
  .hidden { display: none !important; }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 18px;
    transform: translateX(-50%);
    background: rgba(61,58,78,.95);
    color: #fff;
    padding: 12px 20px;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    max-width: 90vw;
    text-align: center;
    box-shadow: 0 6px 20px rgba(0,0,0,.25);
    z-index: 10;
  }

  @keyframes pop {
    0% { transform: scale(.6); opacity: 0; }
    70% { transform: scale(1.08); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes wiggle {
    0%,100% { transform: rotate(-1.5deg) scale(1.02); }
    50% { transform: rotate(1.5deg) scale(1.02); }
  }
  @media (prefers-reduced-motion: reduce) {
    .emoji, .word { animation: none; }
    .lang-btn.speaking { animation: none; }
  }

  /* na široké obrazovce: víc místa → tlačítka v řádku vedle sebe (emoji zůstává vycentrované nad slovem) */
  @media (min-width: 700px) {
    main { max-width: 1000px; }
    .langs { flex-direction: row; align-items: stretch; }
    .lang-btn {
      flex: 1 1 0;
      min-height: clamp(96px, 16vmin, 150px);
      font-size: clamp(22px, 3vmin, 40px);
    }
  }
</style>
</head>
<body>

  <main id="app" class="hidden">
    <div class="stage">
      <div class="emoji" id="emoji" aria-hidden="true"></div>
      <div class="word" id="word"></div>
    </div>
    <div class="langs" id="langs"></div>
  </main>

  <div class="message" id="loading">Načítám slovíčka… 🎈</div>
  <div class="message hidden" id="error"></div>

  <nav id="nav" class="hidden">
    <button class="nav-btn" id="prev" aria-label="Předchozí">◀</button>
    <button class="nav-btn shuffle" id="shuffle" aria-label="Náhodné slovo">🎲</button>
    <button class="nav-btn" id="next" aria-label="Další">▶</button>
  </nav>

<script>
"use strict";

/* ---------- jazyky ---------- */
const LANGS = [
  { key: "en", cls: "en", flag: "🇺🇸", lang: "en-US", fallbacks: ["en-GB", "en"] },
  { key: "de", cls: "de", flag: "🇩🇪", lang: "de-DE", fallbacks: ["de"] },
  { key: "es", cls: "es", flag: "🇪🇸", lang: "es-ES", fallbacks: ["es-MX", "es"] },
];

/* čeština – pro čtení po ťuknutí na emoji nebo české slovo */
const CS = { key: "cs", cls: "cs", flag: "🇨🇿", lang: "cs-CZ", fallbacks: ["cs"] };

/* ---------- stav ---------- */
let words = [];
let idx = 0;

const $ = (id) => document.getElementById(id);

/* ---------- CSV parser (zvládne pole v uvozovkách) ---------- */
function parseCSV(text) {
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else if (c === '"') {
      inQuotes = true;
    } else if (c === ',') {
      row.push(field); field = "";
    } else if (c === '\n' || c === '\r') {
      if (c === '\r' && text[i + 1] === '\n') i++;
      row.push(field); field = "";
      if (row.some((v) => v.trim() !== "")) rows.push(row);
      row = [];
    } else field += c;
  }
  if (field !== "" || row.length) { row.push(field); if (row.some((v) => v.trim() !== "")) rows.push(row); }
  return rows;
}

function loadWords(csv) {
  const rows = parseCSV(csv);
  if (!rows.length) return [];
  const header = rows[0].map((h) => h.trim().toLowerCase());
  const col = (name) => header.indexOf(name);
  const ci = { cs: col("cs"), en: col("en"), de: col("de"), es: col("es"), emoji: col("emoji") };
  const out = [];
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r];
    const get = (k) => (ci[k] >= 0 && row[ci[k]] != null ? row[ci[k]].trim() : "");
    const cs = get("cs");
    if (!cs) continue;
    out.push({ cs, en: get("en"), de: get("de"), es: get("es"), emoji: get("emoji") });
  }
  return out;
}

/* ---------- řeč (Web Speech API) ---------- */
let voices = [];
const synth = window.speechSynthesis;

function refreshVoices() { if (synth) voices = synth.getVoices() || []; }
if (synth) {
  refreshVoices();
  synth.onvoiceschanged = refreshVoices;
}

function pickVoice(def) {
  if (!voices.length) return null;
  const wanted = [def.lang.toLowerCase(), ...def.fallbacks.map((s) => s.toLowerCase())];
  const cand = voices.filter((v) => {
    const l = (v.lang || "").toLowerCase();
    return wanted.includes(l) || l.startsWith(def.key);
  });
  if (!cand.length) return null;
  // 1) preferuj offline (local) hlasy — síťové hlasy (Google na Androidu) jsou pomalé
  //    a při výpadku sítě mlčí; 2) pak podle pořadí preferovaných jazyků
  cand.sort((a, b) => {
    if (!!a.localService !== !!b.localService) return a.localService ? -1 : 1;
    const ra = wanted.indexOf((a.lang || "").toLowerCase());
    const rb = wanted.indexOf((b.lang || "").toLowerCase());
    return (ra < 0 ? 99 : ra) - (rb < 0 ? 99 : rb);
  });
  return cand[0];
}

function buildUtterance(def, text, btn) {
  const u = new SpeechSynthesisUtterance(text);
  const v = pickVoice(def);
  if (v) u.voice = v;
  u.lang = v ? v.lang : def.lang;
  u.rate = 0.85;
  u.pitch = 1.05;
  document.querySelectorAll(".lang-btn.speaking").forEach((b) => b.classList.remove("speaking"));
  if (btn) {
    btn.classList.add("speaking");
    const clear = () => btn.classList.remove("speaking");
    u.onend = clear;
    u.onerror = clear;
  }
  return u;
}

let ttsWarned = false;
function speak(def, text, btn) {
  if (!synth) {
    if (!ttsWarned) { toast("Tvůj prohlížeč neumí číst nahlas 🙊"); ttsWarned = true; }
    return;
  }
  if (!voices.length) refreshVoices();      // hlasy nemusí být po prvním ťuknutí načtené
  if (synth.paused) { try { synth.resume(); } catch (e) {} }  // iOS: odpauzovat

  if (synth.speaking || synth.pending) {
    // už něco mluví → zrušit a chvíli počkat, jinak Android nový projev zahodí
    synth.cancel();
    setTimeout(() => synth.speak(buildUtterance(def, text, btn)), 130);
  } else {
    synth.speak(buildUtterance(def, text, btn));
  }
}

/* ---------- vykreslení ---------- */
function renderLangButtons() {
  const wrap = $("langs");
  wrap.innerHTML = "";
  for (const def of LANGS) {
    const btn = document.createElement("button");
    btn.className = "lang-btn " + def.cls;
    btn.dataset.key = def.key;
    btn.innerHTML = '<span class="flag">' + def.flag + '</span><span class="txt"></span>';
    btn.addEventListener("click", () => {
      const w = words[idx];
      if (w && w[def.key]) speak(def, w[def.key], btn);
    });
    wrap.appendChild(btn);
  }
}

function render() {
  const w = words[idx];
  if (!w) return;
  // re-trigger pop animace
  const emoji = $("emoji"), word = $("word");
  emoji.textContent = w.emoji || "";
  word.textContent = w.cs;
  emoji.style.animation = "none"; word.style.animation = "none";
  void emoji.offsetWidth;
  emoji.style.animation = ""; word.style.animation = "";

  document.querySelectorAll(".lang-btn").forEach((btn) => {
    const key = btn.dataset.key;
    btn.querySelector(".txt").textContent = w[key] || "—";
    btn.classList.remove("speaking");
    btn.disabled = !w[key];
  });
  if (synth) synth.cancel();
}

/* ---------- navigace ---------- */
function go(delta) {
  idx = (idx + delta + words.length) % words.length;
  render();
}
function shuffle() {
  if (words.length < 2) return;
  let n;
  do { n = Math.floor(Math.random() * words.length); } while (n === idx);
  idx = n;
  render();
}

/* ---------- toast ---------- */
let toastTimer = null;
function toast(msg) {
  let t = document.querySelector(".toast");
  if (!t) { t = document.createElement("div"); t.className = "toast"; document.body.appendChild(t); }
  t.textContent = msg;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.remove(), 3000);
}

/* ---------- start ---------- */
function showError(html) {
  $("loading").classList.add("hidden");
  $("app").classList.add("hidden");
  $("nav").classList.add("hidden");
  const e = $("error");
  e.innerHTML = html;
  e.classList.remove("hidden");
}

async function init() {
  try {
    const res = await fetch("words.csv", { cache: "no-cache" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const csv = await res.text();
    words = loadWords(csv);
    if (!words.length) throw new Error("empty");

    renderLangButtons();
    idx = Math.floor(Math.random() * words.length);
    render();

    $("loading").classList.add("hidden");
    $("error").classList.add("hidden");
    $("app").classList.remove("hidden");
    $("nav").classList.remove("hidden");
  } catch (err) {
    showError(
      'Nepodařilo se načíst slovíčka 😟<br>' +
      '<button id="retry">Zkusit znovu</button>'
    );
    const r = $("retry");
    if (r) r.addEventListener("click", () => { $("error").classList.add("hidden"); $("loading").classList.remove("hidden"); init(); });
  }
}

/* ovládací prvky */
$("prev").addEventListener("click", () => go(-1));
$("next").addEventListener("click", () => go(1));
$("shuffle").addEventListener("click", shuffle);

/* ťuknutí na emoji nebo české slovo → přečíst česky */
function speakCzech() {
  const w = words[idx];
  if (w && w.cs) speak(CS, w.cs);
}
$("emoji").addEventListener("click", speakCzech);
$("word").addEventListener("click", speakCzech);

/* klávesnice (pohodlí na PC) */
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") go(-1);
  else if (e.key === "ArrowRight") go(1);
  else if (e.key === " " || e.key === "Spacebar") { e.preventDefault(); shuffle(); }
  else if (e.key === "0") speakCzech();
  else if (e.key >= "1" && e.key <= "3") {
    const def = LANGS[Number(e.key) - 1];
    const w = words[idx];
    const btn = document.querySelector('.lang-btn[data-key="' + def.key + '"]');
    if (w && w[def.key]) speak(def, w[def.key], btn);
  }
});

init();
</script>
</body>
</html>
